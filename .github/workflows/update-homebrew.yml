name: Update Homebrew Cask

on:
  release:
    types: [published]
  workflow_dispatch:
    inputs:
      tag:
        description: "Release tag (e.g. v0.3.7). Defaults to latest release."
        required: false

jobs:
  update-homebrew:
    runs-on: ubuntu-latest
    steps:
      - name: Wait for release assets
        if: github.event_name == 'release'
        run: sleep 15

      - name: Get release info
        id: info
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail

          # Determine the tag: from release event, manual input, or latest
          if [[ "${{ github.event_name }}" == "release" ]]; then
            TAG="${GITHUB_REF_NAME}"
          elif [[ -n "${{ github.event.inputs.tag }}" ]]; then
            TAG="${{ github.event.inputs.tag }}"
          else
            TAG=$(gh release view --repo ${{ github.repository }} --json tagName -q .tagName)
          fi

          VERSION="${TAG#v}"
          DMG_URL="https://github.com/${{ github.repository }}/releases/download/${TAG}/nudgeNotch.dmg"

          # Download DMG to a file, then hash it
          DMG_FILE="$(mktemp)"
          trap 'rm -f "$DMG_FILE"' EXIT

          for i in 1 2 3; do
            if curl -sL --fail -o "$DMG_FILE" "$DMG_URL"; then break; fi
            echo "Attempt $i failed, retrying in 10s..."; sleep 10
          done
          [[ -s "$DMG_FILE" ]] || { echo "::error::Failed to download DMG"; exit 1; }

          SHA256=$(shasum -a 256 "$DMG_FILE" | cut -d' ' -f1)

          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          echo "sha256=$SHA256" >> "$GITHUB_OUTPUT"
          echo "url=$DMG_URL" >> "$GITHUB_OUTPUT"

      - name: Checkout Homebrew tap
        uses: actions/checkout@v6
        with:
          repository: suryanshkushwaha/homebrew-nudge-notch
          token: ${{ secrets.HOMEBREW_TAP_TOKEN }}

      - name: Update cask
        env:
          VERSION: ${{ steps.info.outputs.version }}
          SHA256: ${{ steps.info.outputs.sha256 }}
        run: |
          mkdir -p Casks
          cat > Casks/nudge-notch.rb <<CASK
          cask "nudge-notch" do
            version "${VERSION}"
            sha256 "${SHA256}"

            url "https://github.com/suryanshkushwaha/nudge.notch/releases/download/v#{version}/nudgeNotch.dmg"
            name "NudgeNotch"
            desc "Gentle nudges for your wellbeing and focus, right in your MacBook notch"
            homepage "https://github.com/suryanshkushwaha/nudge.notch"

            livecheck do
              url :url
              strategy :github_latest
            end

            depends_on macos: ">= :sonoma"

            app "nudgeNotch.app"

            zap trash: [
              "~/Library/Preferences/com.kushwahaandcompany.nudgeNotch.plist",
              "~/Library/Containers/suryanshkushwaha.nudgeNotch/",
            ]
          end
          CASK
          # Strip leading whitespace from heredoc
          sed -i 's/^          //' Casks/nudge-notch.rb

      - name: Commit and push
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add Casks/
          if git diff --cached --quiet; then
            echo "No changes"
          else
            git commit -m "Update nudge-notch to v${{ steps.info.outputs.version }}"
            git push
          fi
