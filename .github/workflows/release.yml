name: Build & Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  build:
    name: Build DMG
    runs-on: macos-15
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Select Xcode
        uses: maxim-lobanov/setup-xcode@v1
        with:
          xcode-version: latest-stable

      - name: Build Archive
        run: |
          xcodebuild clean archive \
            -project nudgeNotch.xcodeproj \
            -scheme NudgeNotch \
            -configuration Release \
            -archivePath build/nudgeNotch.xcarchive \
            CODE_SIGN_IDENTITY="-" \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGNING_ALLOWED=NO

      - name: Export Archive
        run: |
          xcodebuild -exportArchive \
            -archivePath build/nudgeNotch.xcarchive \
            -exportPath build/export \
            -exportOptionsPlist ExportOptions.plist

      - name: Create DMG
        run: |
          brew install create-dmg
          mkdir -p dmg_staging
          cp -R "build/export/nudgeNotch.app" dmg_staging/
          create-dmg \
            --volname "nudgeNotch" \
            --window-size 600 400 \
            --icon-size 128 \
            --icon "nudgeNotch.app" 150 200 \
            --app-drop-link 450 200 \
            "nudgeNotch.dmg" \
            "dmg_staging"

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          files: nudgeNotch.dmg
